<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Audio Responsive Waveform Mesh</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #020208;
            font-family: 'Segoe UI', sans-serif;
        }
        canvas {
            display: block;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }
        /* Interface de démarrage */
        #overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgba(2, 2, 8, 0.85);
            backdrop-filter: blur(10px);
            transition: opacity 0.5s ease;
        }
        #start-btn {
            background: linear-gradient(45deg, #00f2fe, #4facfe);
            border: none;
            color: white;
            padding: 15px 40px;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 0 20px rgba(0, 242, 254, 0.4);
            transition: transform 0.2s, box-shadow 0.2s;
        }
        #start-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 30px rgba(0, 242, 254, 0.8);
        }
        #info-text {
            color: #8a8ab0;
            margin-top: 15px;
            font-size: 0.9rem;
            text-align: center;
            max-width: 400px;
            line-height: 1.4;
        }
    </style>
</head>
<body>

    <div id="overlay">
        <button id="start-btn">CAPTER L'AUDIO SYSTEME</button>
        <p id="info-text">Cliquez puis sélectionnez l'onglet, la fenêtre ou le flux audio "Monitor" (PipeWire) à analyser.</p>
    </div>

    <canvas id="webgl-canvas"></canvas>

    <script type="importmap">
        {
            "imports": {
                "three": "https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
        import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
        import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';

        // --- PARAMÈTRES DU MAILLAGE 3D ---
        const MESH_WIDTH = 60;
        const MESH_DEPTH = 60;
        const GRID_SEGMENTS = 59; // Largeur/Profondeur - 1
        
        let scene, camera, renderer, composer, terrainGeometry, terrainMesh;
        let audioContext, analyser, dataArray;
        let isAudioInitialized = false;

        const startBtn = document.getElementById('start-btn');
        const overlay = document.getElementById('overlay');

        startBtn.addEventListener('click', initAudioAnd3D);

        async function initAudioAnd3D() {
            try {
                // 1. CAPTURE DE L'AUDIO (Gestion de PipeWire / Flux Système)
                // getDisplayMedia permet de capturer l'audio du système via le partage d'écran/flux
                const stream = await navigator.mediaDevices.getDisplayMedia({
                    video: true, // Requis par l'API, mais on ne gardera que l'audio
                    audio: {
                        echoCancellation: false,
                        noiseSuppression: false,
                        autoGainControl: false
                    }
                });

                // Couper la piste vidéo pour ne pas consommer de ressources inutilement
                stream.getVideoTracks().forEach(track => track.stop());

                // Vérifier si une piste audio a bien été partagée
                if (stream.getAudioTracks().length === 0) {
                    alert("Aucun flux audio sélectionné. Assurez-vous de cocher 'Partager l'audio'.");
                    return;
                }

                // Initialisation de l'analyseur Web Audio
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
                const source = audioContext.createMediaStreamSource(stream);
                analyser = audioContext.createAnalyser();
                analyser.fftSize = 128; // Petite taille pour correspondre aux lignes du maillage (60)
                
                source.connect(analyser);
                dataArray = new Uint8Array(analyser.frequencyBinCount);
                
                isAudioInitialized = true;
                
                // Cacher l'overlay
                overlay.style.opacity = 0;
                setTimeout(() => overlay.style.display = 'none', 500);

                // Lancer la 3D
                init3D();

            } catch (err) {
                console.error("Erreur de capture audio: ", err);
                alert("Impossible d'accéder au flux audio. Note : Sous Linux/PipeWire, choisissez le partage d'écran complet et cochez 'Partager l'audio'.");
            }
        }

        function init3D() {
            // --- SCÈNE & CAMÉRA ---
            scene = new THREE.Scene();
            scene.fog = new THREE.FogExp2(0x020208, 0.025);

            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
            // Positionner la caméra en hauteur, orientée vers le maillage
            camera.position.set(0, 20, 45);
            camera.lookAt(0, -2, 0);

            // --- RENDERER ---
            const canvas = document.getElementById('webgl-canvas');
            renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);

            // --- POST-PROCESSING (BLOOM POUR EFFET NÉON) ---
            const renderScene = new RenderPass(scene, camera);
            const bloomPass = new UnrealBloomPass(
                new THREE.Vector2(window.innerWidth, window.innerHeight),
                2.5,  // Intensité de la lueur
                0.5,  // Rayon du flou
                0.1   // Seuil de luminosité
            );

            composer = new EffectComposer(renderer);
            composer.addPass(renderScene);
            composer.addPass(bloomPass);

            // --- CRÉATION DU MAILLAGE 3D (TERRAIN WIREFRAME) ---
            // PlaneGeometry crée une grille de sommets
            terrainGeometry = new THREE.PlaneGeometry(MESH_WIDTH, MESH_DEPTH, GRID_SEGMENTS, GRID_SEGMENTS);
            // Rotation pour la mettre à plat sur l'axe X
            terrainGeometry.rotateX(-Math.PI / 2);

            // Matériau basique de type lignes / wireframe pour le look rétro-futuriste
            const terrainMaterial = new THREE.MeshBasicMaterial({
                color: 0x00f2fe,
                wireframe: true,
                transparent: true,
                opacity: 0.6,
                blending: THREE.AdditiveBlending
            });

            terrainMesh = new THREE.Mesh(terrainGeometry, terrainMaterial);
            scene.add(terrainMesh);

            // Lumière ambiante très faible pour colorer subtilement le fond
            const ambientLight = new THREE.AmbientLight(0x111133);
            scene.add(ambientLight);

            window.addEventListener('resize', onWindowResize);
            
            animate();
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            composer.setSize(window.innerWidth, window.innerHeight);
        }

        // --- BOUCLE D'ANIMATION ---
        let clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);

            const time = clock.getElapsedTime();
            const posAttr = terrainGeometry.attributes.position;

            if (isAudioInitialized) {
                // Récupérer les données de fréquences (basses à aiguës)
                analyser.getByteFrequencyData(dataArray);
                
                // Intensité générale de la musique (moyenne des fréquences)
                let sum = 0;
                for(let i=0; i<dataArray.length; i++) sum += dataArray[i];
                let averageVolume = sum / dataArray.length;
                let normalizedVolume = averageVolume / 255;

                // Faire réagir la couleur et l'opacité au rythme du volume
                // Transition dynamique du Cyan vers le Magenta selon l'intensité
                terrainMesh.material.color.setHSL(0.5 + (normalizedVolume * 0.3), 1, 0.5);
                terrainMesh.material.opacity = 0.4 + (normalizedVolume * 0.6);

                // Déplacement des lignes du maillage pour créer la vague
                // On applique l'audio sur la rangée du fond et on fait glisser les valeurs vers l'avant
                for (let z = GRID_SEGMENTS; z >= 0; z--) {
                    for (let x = 0; x <= GRID_SEGMENTS; x++) {
                        const currentVertexIndex = z * (GRID_SEGMENTS + 1) + x;

                        if (z === 0) {
                            // La première ligne (le fond) se base directement sur le spectre audio
                            // On mappe les index X sur les données audio disponibles
                            let audioIndex = Math.floor((x / GRID_SEGMENTS) * (dataArray.length / 2));
                            // Si on est sur les côtés de la grille, on réduit l'amplitude pour un effet propre
                            let edgeTaper = Math.sin((x / GRID_SEGMENTS) * Math.PI); 
                            
                            let targetHeight = (dataArray[audioIndex] / 255) * 12 * edgeTaper;
                            posAttr.setY(currentVertexIndex, targetHeight);
                        } else {
                            // Les autres lignes copient la hauteur de la ligne précédente (effet de vague de propagation)
                            const previousVertexIndex = (z - 1) * (GRID_SEGMENTS + 1) + x;
                            let prevHeight = posAttr.getY(previousVertexIndex);
                            
                            // On applique un léger amorti pour lisser la propagation vers l'avant
                            posAttr.setY(currentVertexIndex, prevHeight * 0.98);
                        }
                    }
                }
            } else {
                // Animation de veille si pas d'audio (simple ondulation mathématique)
                for (let i = 0; i < posAttr.count; i++) {
                    let x = posAttr.getX(i);
                    let z = posAttr.getZ(i);
                    let y = Math.sin(x * 0.2 + time * 2) * Math.cos(z * 0.2 + time * 2) * 1.5;
                    posAttr.setY(i, y);
                }
            }

            // Indiquer à Three.js que les positions des sommets ont changé
            posAttr.needsUpdate = true;

            // Rotation lente du plateau pour la perspective
            if(terrainMesh) {
                terrainMesh.rotation.y = Math.sin(time * 0.05) * 0.1;
            }

            // Rendu final avec le post-processing (Bloom)
            composer.render();
        }
    </script>
</body>
</html>
